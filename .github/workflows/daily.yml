name: Daily Spiritual Content Pipeline

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日 JST 05:00 に実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restore performance data cache
        uses: actions/cache@v4
        with:
          path: performance_data.json
          key: perf-data-${{ github.run_number }}
          restore-keys: perf-data-

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        
              - name: Download background videos and BGM
        run: |
          mkdir -p assets/bg_videos assets/bgm
 
          # 背景映像をPixabayから取得（著作権フリー・商用利用OK）
          python3 - <<'PYEOF'
          import urllib.request
          import os
 
          # Pixabay 無料動画（直リンク）
          # 星・宇宙・神秘系 - 占い・スピリチュアルコンテンツ向け
          videos = {
              "assets/bg_videos/star01.mp4":   "https://cdn.pixabay.com/video/2016/09/12/5206-183199461_tiny.mp4",
              "assets/bg_videos/star02.mp4":   "https://cdn.pixabay.com/video/2022/10/27/136420-765932176_tiny.mp4",
              "assets/bg_videos/mystic01.mp4": "https://cdn.pixabay.com/video/2020/07/30/46237-447087782_tiny.mp4",
              "assets/bg_videos/nature01.mp4": "https://cdn.pixabay.com/video/2021/04/05/70921-535925874_tiny.mp4",
              "assets/bg_videos/nature02.mp4": "https://cdn.pixabay.com/video/2019/04/16/23090-330546028_tiny.mp4",
          }
 
          for path, url in videos.items():
              if not os.path.exists(path):
                  print(f"Downloading {path}...")
                  try:
                      urllib.request.urlretrieve(url, path)
                      size = os.path.getsize(path) // 1024
                      print(f"  ✅ {path} ({size} KB)")
                  except Exception as e:
                      print(f"  ⚠️ Failed: {e}")
              else:
                  print(f"  Skip (exists): {path}")
 
          # BGM: 無音ファイルをフォールバックとして生成（実素材は別途配置推奨）
          bgm_files = [
              "assets/bgm/mystic_01.mp3",
              "assets/bgm/star_01.mp3",
              "assets/bgm/tarot_01.mp3",
          ]
          import subprocess
          for bgm in bgm_files:
              if not os.path.exists(bgm):
                  print(f"Generating silent BGM: {bgm}")
                  subprocess.run([
                      "ffmpeg", "-y", "-f", "lavfi",
                      "-i", "anullsrc=r=44100:cl=stereo",
                      "-t", "60", "-q:a", "9", "-acodec", "libmp3lame",
                      bgm
                  ], capture_output=True)
                  print(f"  ✅ {bgm}")
 
          print("Assets ready!")
          PYEOF


      - name: Run content pipeline
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:     ${{ secrets.ELEVENLABS_API_KEY }}
          TIKTOK_ACCESS_TOKEN:    ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          YOUTUBE_ACCESS_TOKEN:   ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: python pipeline.py

      - name: Upload performance data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-data-${{ github.run_number }}
          path: performance_data.json
          retention-days: 90
