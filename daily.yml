name: Daily Spiritual Content Pipeline

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日 JST 05:00 に実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Restore performance data cache
        uses: actions/cache@v4
        with:
          path: performance_data.json
          key: perf-data-${{ github.run_number }}
          restore-keys: perf-data-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run content pipeline
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:     ${{ secrets.ELEVENLABS_API_KEY }}
          TIKTOK_ACCESS_TOKEN:    ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          YOUTUBE_ACCESS_TOKEN:   ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: python pipeline.py

      - name: Upload performance data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-data-${{ github.run_number }}
          path: performance_data.json
          retention-days: 90
