<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spiritual Content Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a18;
    color: #e0d8ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .orb {
    width: 100px; height: 100px;
    background: radial-gradient(circle at 35% 35%, #c084fc, #6d28d9 60%, #1e1b4b);
    border-radius: 50%;
    margin: 0 auto 32px;
    box-shadow: 0 0 60px #7c3aed88;
  }
  h1 { font-size: 2rem; font-weight: 700; color: #e9d5ff; margin-bottom: 12px; }
  p  { font-size: 1rem; color: #a78bfa; max-width: 480px; line-height: 1.7; margin-bottom: 32px; }
  nav a {
    display: inline-block;
    margin: 6px 10px;
    padding: 8px 20px;
    background: #1e1b4b;
    border: 1px solid #4c1d95;
    border-radius: 999px;
    color: #c4b5fd;
    text-decoration: none;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  nav a:hover { background: #2e1b69; }
</style>
</head>
<body>
  <div class="orb"></div>
  <h1>Spiritual Content Bot</h1>
  <p>An automated content creation and distribution service for daily spiritual, horoscope, and tarot content across TikTok and YouTube.</p>
  <nav>
    <a href="terms.html">Terms of Service</a>
    <a href="privacy.html">Privacy Policy</a>
  </nav>
</body>
</html>
